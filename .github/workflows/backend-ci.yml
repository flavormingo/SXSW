name: Backend CI

on:
  push:
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sxsw_test
          BETTER_AUTH_SECRET: test-secret-32-characters-long-xxx
          RESEND_API_KEY: re_test_xxxxxxxxxxxx
